<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>VECNA — D&D 5e Compendium</title>
  <meta name="vecna-server" content="https://vecna-svpo.onrender.com" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/content.css" />
  <link rel="stylesheet" href="styles/dice.css" />
  <link rel="stylesheet" href="styles/layout.css" />
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div>
        <h1>VECNA</h1>
        <div class="subtitle">D&D 5e · SRD Compendium</div>
      </div>
    </div>
    <div class="server-status">
      <div class="status-dot checking" id="status-dot"></div>
      <span id="status-label">Connecting…</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="monsters">Monsters</button>
    <button class="tab-btn" data-tab="spells">Spells</button>
    <button class="tab-btn" data-tab="classes">Classes</button>
    <button class="tab-btn" data-tab="dice">Dice</button>
  </div>

  <!-- ── MONSTERS ── -->
  <div class="tab-panel active main" id="tab-monsters">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="monster-search" placeholder="Search monsters…" />
      </div>
      <div class="list-container" id="monster-list">
        <div class="loading-msg">Loading monsters…</div>
      </div>
    </div>
    <div class="detail" id="monster-detail">
      <div class="detail-placeholder">Select a monster</div>
    </div>
  </div>

  <!-- ── SPELLS ── -->
  <div class="tab-panel main" id="tab-spells">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="spell-search" placeholder="Search spells…" />
      </div>
      <div class="list-container" id="spell-list">
        <div class="loading-msg">Loading spells…</div>
      </div>
    </div>
    <div class="detail" id="spell-detail">
      <div class="detail-placeholder">Select a spell</div>
    </div>
  </div>

  <!-- ── CLASSES ── -->
  <div class="tab-panel main" id="tab-classes">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="class-search" placeholder="Search classes…" />
      </div>
      <div class="list-container" id="class-list">
        <div class="loading-msg">Loading classes…</div>
      </div>
    </div>
    <div class="detail" id="class-detail">
      <div class="detail-placeholder">Select a class</div>
    </div>
  </div>

  <!-- ── DICE ── -->
  <div class="tab-panel" id="tab-dice">
    <div class="dice-panel">
      <div class="dice-card">
        <h2>Dice Roller</h2>
        <div class="dice-quick">
          <button onclick="quickRoll('1d4')">d4</button>
          <button onclick="quickRoll('1d6')">d6</button>
          <button onclick="quickRoll('1d8')">d8</button>
          <button onclick="quickRoll('1d10')">d10</button>
          <button onclick="quickRoll('1d12')">d12</button>
          <button onclick="quickRoll('1d20')">d20</button>
          <button onclick="quickRoll('1d100')">d100</button>
          <button onclick="quickRoll('4d6')">4d6</button>
          <button onclick="quickRoll('2d6+3')">2d6+3</button>
        </div>
        <div class="dice-input-row">
          <input type="text" id="dice-input" placeholder="e.g. 2d6+3" value="1d20" />
          <button onclick="rollDice()">Roll</button>
        </div>
        <div class="dice-result" id="dice-result">—</div>
        <div class="dice-history">
          <h3>History</h3>
          <div id="dice-history-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/core.js" defer></script>
<script src="js/monsters.js" defer></script>
<script src="js/spells.js" defer></script>
<script src="js/classes.js" defer></script>
<script src="js/dice.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
